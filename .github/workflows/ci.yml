name: CI/CD Pipeline

on:
  # 1. Run tests on Pull Requests (before merging)
  pull_request:
    branches: [ main ]

  # 2. Manual trigger for deployments
  workflow_dispatch:
    inputs:
      deploy_to_testflight:
        description: 'Deploy to TestFlight?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
jobs:
  test:
    name: Run Tests
    runs-on: macos-15
    # Only run tests on PRs, not on every push
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      
      - name: Install dependencies
        run: bundle install
      
      - name: Run tests
        run: bundle exec fastlane test
        continue-on-error: true  # Don't fail if no tests yet

  deploy:
    name: Deploy to TestFlight
    runs-on: macos-15
    # Only run when MANUALLY triggered
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_to_testflight == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      
      - name: Install dependencies
        run: bundle install
      
      - name: Create Secrets.xcconfig file
        run: |
          mkdir -p Config
          cat > Config/Secrets.xcconfig << EOF
          //
          //  Secrets.xcconfig
          //  MonoTimer
          //
          // Supabase Configuration
          
          SUPABASE_URL = ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY = ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_CLIENT_ID = ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_REVERSED_CLIENT_ID = ${{ secrets.GOOGLE_REVERSED_CLIENT_ID }}
          EOF
      
      - name: Create API Key file
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.ASC_KEY_CONTENT }}" | base64 --decode > ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          chmod 600 ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
      
      - name: Import Code Signing Certificate
        run: |
          # Create keychain
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          
          # Import certificate (create in /tmp to avoid polluting git repo)
          echo "${{ secrets.BUILD_CERTIFICATE_BASE64 }}" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm /tmp/certificate.p12
          
          # Import provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
      
      - name: Deploy to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
        run: bundle exec fastlane beta
